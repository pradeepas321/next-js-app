
name: Deploy

on:
  push:
    branches: [ "main" ]

jobs:




  deploy:

    runs-on: ubuntu-latest


    steps:
    - uses: actions/checkout@v4
    - run: docker build . -t dockerhubsapradeep/next-js-app
    - run: echo "${{ secrets.DOCKERHUB_PASSWORD}}" | docker login -u ${{ secrets.DOCKERHUB_USER}} --password-stdin
    - run: docker push dockerhubsapradeep/next-js-app:latest 
